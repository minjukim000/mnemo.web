<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MNEMO | My Archived Memory</title>
    <style>
        :root {
            --bg-color: #F5F1EA; 
            --point-color: #A36B5E;
            --text-color: #2A2A2A;
            --line-color: rgba(0, 0, 0, 0.1);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Playfair Display', 'Noto Serif KR', serif;
            display: flex; justify-content: center; align-items: center;
            background-image: 
                linear-gradient(rgba(245, 241, 234, 0.8), rgba(245, 241, 234, 0.8)),
                url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.15'/%3E%3C/svg%3E");
        }

        .saved-report {
            width: 90%;
            max-width: 500px;
            background: #fff;
            padding: 60px;
            box-shadow: 15px 15px 50px rgba(0,0,0,0.05);
            text-align: center;
            animation: fadeIn 1.5s ease;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='paper'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.04' numOctaves='5' stitchTiles='stitch'/%3E%3CfeDiffuseLighting in='noise' lighting-color='white' surfaceScale='1'%3E%3CfeDistantLight azimuth='45' elevation='60'/%3E%3C/feDiffuseLighting%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23paper)' opacity='0.03'/%3E%3C/svg%3E");
        }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        .archive-seal {
            font-size: 0.65rem;
            letter-spacing: 3px;
            color: var(--point-color);
            border: 1px solid var(--point-color);
            display: inline-block;
            padding: 5px 15px;
            margin-bottom: 40px;
        }

        .saved-image-container {
            width: 280px;
            height: 280px;
            margin: 0 auto 40px;
            border: 1px solid var(--line-color);
            background: #fafafa;
            overflow: hidden;
        }

        .saved-image-container img { width: 100%; height: 100%; object-fit: cover; }

        .info-display {
            border-top: 1px double var(--line-color);
            border-bottom: 1px double var(--line-color);
            padding: 30px 0;
            margin-bottom: 30px;
            font-family: 'Courier New', Courier, monospace;
        }

        .info-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.85rem; }
        .info-label { color: var(--point-color); font-weight: bold; }
        .info-value { text-align: right; border-bottom: 1px solid #eee; flex: 1; margin-left: 20px; }

        .action-btns { display: flex; gap: 10px; margin-bottom: 10px; }
        .btn { flex: 1; padding: 15px; font-size: 0.7rem; letter-spacing: 2px; cursor: pointer; border: 1px solid var(--text-color); text-decoration: none; color: var(--text-color); background: transparent; transition: 0.3s; display: flex; align-items: center; justify-content: center; }
        .btn-dark { background: var(--text-color); color: #fff; }
        .btn:hover { opacity: 0.7; letter-spacing: 4px; }

        /* [추가] 주문하기 버튼 스타일 */
        .order-btn-full {
            width: 100%;
            padding: 18px;
            background-color: transparent;
            color: var(--point-color);
            border: 1px solid var(--point-color);
            font-family: 'Noto Serif KR', serif;
            font-size: 0.8rem;
            letter-spacing: 4px;
            cursor: pointer;
            transition: all 0.4s ease;
            margin-top: 5px;
        }

        .order-btn-full:hover {
            background-color: var(--point-color);
            color: #fff;
            letter-spacing: 7px;
        }

        .barcode { width: 100px; height: 30px; margin: 30px auto 0; opacity: 0.4; background: repeating-linear-gradient(90deg, #000, #000 1px, transparent 1px, transparent 4px); }
    </style>
</head>
<body>

    <div class="saved-report">
        <div class="archive-seal">OFFICIAL MEMORY REGISTERED</div>
        
        <div class="saved-image-container" id="displayImage"></div>

        <div class="info-display">
            <div class="info-row">
                <span class="info-label">DATE</span>
                <span class="info-value" id="displayDate"></span>
            </div>
            <div class="info-row">
                <span class="info-label">LOCATION</span>
                <span class="info-value" id="displayLoc"></span>
            </div>
            <div class="info-row">
                <span class="info-label">TITLE</span>
                <span class="info-value" id="displayTitle"></span>
            </div>
        </div>

        <div class="action-btns">
            <a href="index.html" class="btn">HOME</a>
            <a href="memory.html" class="btn btn-dark">나의 기억</a>
        </div>

        <button class="order-btn-full" onclick="alert('주문 페이지로 이동합니다. (준비 중인 기능입니다)')">
            나의 향수 주문하기
        </button>

        <div class="barcode"></div>
        <p style="font-size: 0.6rem; opacity: 0.3; margin-top: 20px;">UUID: MN-ARCHIVE-8802-X</p>
    </div>

    <script>
        window.onload = function() {
            const date = localStorage.getItem('memoryDate');
            const loc = localStorage.getItem('memoryLoc');
            const title = localStorage.getItem('memoryTitle');
            const image = localStorage.getItem('memoryImage');

            if(date) document.getElementById('displayDate').innerText = date;
            if(loc) document.getElementById('displayLoc').innerText = loc;
            if(title) document.getElementById('displayTitle').innerText = title;
            if(image) {
                document.getElementById('displayImage').innerHTML = `<img src="${image}" alt="Memory">`;
            }
        }
    </script>
</body>
</html>
