<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MNEMO | Memory Archive List</title>
    <style>
        :root {
            --bg-color: #F5F1EA;
            --point-color: #A36B5E;
            --text-color: #2A2A2A;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Playfair Display', 'Noto Serif KR', serif;
            min-height: 100vh;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.1'/%3E%3C/svg%3E");
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 80px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 80px;
        }

        header h1 {
            font-size: 2.5rem;
            letter-spacing: 10px;
            margin-bottom: 10px;
        }

        .back-home {
            text-decoration: none;
            color: var(--text-color);
            font-size: 0.8rem;
            letter-spacing: 2px;
            opacity: 0.5;
        }

        .memory-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* [수정] 클릭 가능하도록 커서 및 효과 추가 */
        .memory-item {
            display: flex;
            background: #fff;
            padding: 20px;
            gap: 30px;
            box-shadow: 5px 5px 20px rgba(0,0,0,0.02);
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
            animation: fadeIn 1s ease;
        }

        .memory-item:hover {
            transform: translateX(10px);
            box-shadow: 10px 10px 30px rgba(0,0,0,0.05);
        }

        .memory-thumb {
            width: 80px;
            height: 80px;
            background: #fafafa;
            overflow: hidden;
            flex-shrink: 0;
        }

        .memory-thumb img { width: 100%; height: 100%; object-fit: cover; }

        .memory-info { flex: 1; }
        .memory-info .m-date { font-size: 0.7rem; color: var(--point-color); letter-spacing: 1px; }
        .memory-info .m-title { font-size: 1.1rem; margin: 5px 0; letter-spacing: 1px; }
        .memory-info .m-loc { font-size: 0.8rem; opacity: 0.5; }

        .empty-msg { text-align: center; opacity: 0.3; margin-top: 100px; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>MY MEMORIES</h1>
            <a href="index.html" class="back-home">← BACK TO HOME</a>
        </header>

        <div id="archiveList" class="memory-list"></div>
    </div>

    <script>
        window.onload = function() {
            const listContainer = document.getElementById('archiveList');
            
            // 데이터 불러오기
            const date = localStorage.getItem('memoryDate');
            const loc = localStorage.getItem('memoryLoc');
            const title = localStorage.getItem('memoryTitle');
            const image = localStorage.getItem('memoryImage');

            if (!date && !title) {
                listContainer.innerHTML = '<p class="empty-msg">아직 기록된 기억이 없습니다.</p>';
            } else {
                const item = document.createElement('div');
                item.className = 'memory-item';
                
                // [수정] 클릭 시 다시 result.html로 이동하는 함수 연결
                item.onclick = function() {
                    window.location.href = "result.html";
                };

                item.innerHTML = `
                    <div class="memory-thumb">
                        <img src="${image || ''}" alt="">
                    </div>
                    <div class="memory-info">
                        <div class="m-date">${date}</div>
                        <div class="m-title">${title}</div>
                        <div class="m-loc">${loc}</div>
                    </div>
                    <div style="opacity: 0.2; font-size: 0.8rem;">VIEW DETAILS →</div>
                `;
                listContainer.appendChild(item);
            }
        }
    </script>
</body>
</html>
