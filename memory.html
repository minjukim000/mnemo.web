<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MNEMO | My Boarding Passes</title>
    <style>
        :root {
            --bg-color: #F5F1EA;
            --point-color: #A36B5E;
            --text-color: #2A2A2A;
            --ticket-bg: #ffffff;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Playfair Display', 'Noto Serif KR', serif;
            min-height: 100vh;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.1'/%3E%3C/svg%3E");
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
        }

        header h1 {
            font-size: 1.8rem;
            letter-spacing: 8px;
            margin-bottom: 15px;
            font-weight: 400;
        }

        .back-home {
            text-decoration: none;
            color: var(--text-color);
            font-size: 0.7rem;
            letter-spacing: 2px;
            opacity: 0.4;
            text-transform: uppercase;
        }

        .memory-list {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        /* --- 항공권 스타일 UI --- */
        .ticket-item {
            display: flex;
            flex-direction: column;
            background: var(--ticket-bg);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            cursor: pointer;
            transition: transform 0.3s ease;
            position: relative;
        }

        .ticket-item:hover {
            transform: translateY(-5px);
        }

        /* 티켓 상단: 메인 정보 */
        .ticket-main {
            padding: 25px;
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .ticket-thumb {
            width: 70px;
            height: 70px;
            border-radius: 50%; /* 비행기 창문 혹은 스탬프 느낌 */
            overflow: hidden;
            border: 2px solid var(--bg-color);
            flex-shrink: 0;
        }

        .ticket-thumb img { width: 100%; height: 100%; object-fit: cover; }

        .ticket-info { flex: 1; }
        .ticket-info .t-route { 
            font-size: 0.6rem; 
            color: var(--point-color); 
            letter-spacing: 2px;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .ticket-info .t-title { 
            font-size: 1.2rem; 
            margin: 0; 
            letter-spacing: 1px;
            font-weight: 500;
        }
        .ticket-info .t-loc { 
            font-size: 0.75rem; 
            opacity: 0.5; 
            margin-top: 3px;
        }

        /* 티켓 구분선 (절취선) */
        .ticket-divider {
            height: 1px;
            border-top: 1px dashed #eee;
            position: relative;
            margin: 0 15px;
        }

        .ticket-divider::before, .ticket-divider::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            background: var(--bg-color);
            border-radius: 50%;
            top: -8px;
        }
        .ticket-divider::before { left: -23px; }
        .ticket-divider::after { right: -23px; }

        /* 티켓 하단: 바코드 및 상세 안내 */
        .ticket-footer {
            padding: 15px 25px;
            background: #fafafa;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .t-date {
            font-family: monospace;
            font-size: 0.75rem;
            letter-spacing: 1px;
        }

        .t-barcode {
            width: 60px;
            height: 20px;
            background: repeating-linear-gradient(90deg, #000, #000 1px, transparent 1px, transparent 3px);
            opacity: 0.2;
        }

        .empty-msg { text-align: center; opacity: 0.3; margin-top: 100px; font-size: 0.9rem; }
        
        /* 비행기 아이콘 애니메이션용 */
        .airplane-icon {
            position: absolute;
            right: 25px;
            top: 25px;
            font-size: 1.2rem;
            opacity: 0.1;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>ARCHIVE LIST</h1>
            <a href="index.html" class="back-home">← Terminate Session</a>
        </header>

        <div id="archiveList" class="memory-list"></div>
    </div>

    <script>
        window.onload = function() {
            const listContainer = document.getElementById('archiveList');
            
            // 데이터 불러오기
            const date = localStorage.getItem('memoryDate');
            const loc = localStorage.getItem('memoryLoc');
            const title = localStorage.getItem('memoryTitle');
            const image = localStorage.getItem('memoryImage');

            if (!date && !title) {
                listContainer.innerHTML = '<p class="empty-msg">No boarding passes issued yet.</p>';
            } else {
                const item = document.createElement('div');
                item.className = 'ticket-item';
                
                // 클릭 시 다시 result.html로 이동
                item.onclick = function() {
                    window.location.href = "result.html";
                };

                item.innerHTML = `
                    <div class="airplane-icon">✈</div>
                    <div class="ticket-main">
                        <div class="ticket-thumb">
                            <img src="${image || ''}" alt="">
                        </div>
                        <div class="ticket-info">
                            <div class="t-route">MEMORY → ARCHIVE</div>
                            <h2 class="t-title">${title}</h2>
                            <div class="t-loc">${loc}</div>
                        </div>
                    </div>
                    
                    <div class="ticket-divider"></div>
                    
                    <div class="ticket-footer">
                        <div class="t-date">DATE: ${date}</div>
                        <div class="t-barcode"></div>
                    </div>
                `;
                listContainer.appendChild(item);
            }
        }
    </script>
</body>
</html>
