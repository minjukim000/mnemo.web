<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MENEMO - 계정</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght=300;400;500;700&display=swap" rel="stylesheet">
    <style>
        /* 기본 스타일 초기화 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Noto Sans KR', sans-serif;
            color: #111;
        }
        body {
            background-color: #fff;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        a {
            text-decoration: none;
            color: inherit;
        }

        /* 1. 상단 헤더 및 내비게이션 (로고 이미지 스타일 보정) */
        header {
            width: 100%;
            border-bottom: 1px solid #e5e5e5;
            position: sticky;
            top: 0;
            background: #fff;
            z-index: 1000;
        }
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        /* [스타일 일치] 이미지 로고 구조 패키징 */
        .logo {
            display: flex;
            align-items: center;
        }
        .logo a {
            display: block;
            height: 45px; /* 부모 요소를 이미지 높이에 동기화 */
        }
        .logo-img {
            height: 45px;  /* 세로 길이 45px 지정 */
            width: auto;   /* 가로 비율 자동 유지 */
            display: block;
        }

        .search-container {
            flex-grow: 0.4;
            position: relative;
        }
        .search-container input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #e5e5e5;
            background-color: #f9f9f9;
            font-size: 13px;
        }
        .header-util {
            display: flex;
            gap: 20px;
            font-size: 12px;
            color: #555;
        }

        /* 내비게이션 메뉴 */
        .nav-bar {
            border-top: 1px solid #f0f0f0;
        }
        .nav-menu {
            display: flex;
            justify-content: center;
            gap: 30px;
            padding: 12px 0;
            list-style: none;
            font-size: 13px;
            font-weight: 500;
        }
        .nav-menu li a:hover {
            text-decoration: underline;
        }

        /* 2. 메인 컨테이너 영역 */
        .account-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 60px 20px;
            background-color: #fafafa;
        }
        .account-container {
            width: 100%;
            max-width: 440px;
            background: #fff;
            padding: 40px;
            border: 1px solid #e5e5e5;
        }
        
        /* 로그인 / 회원가입 양식 기본 숨김 처리 제어 */
        .account-box {
            display: none;
        }
        .account-box.active {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .account-title {
            font-size: 19px;
            font-weight: 500;
            letter-spacing: 1.5px;
            text-align: center;
            margin-bottom: 35px;
            text-transform: uppercase;
        }
        
        /* 폼 공통 디자인 */
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            font-size: 11px;
            color: #666;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }
        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #e5e5e5;
            font-size: 13px;
            background-color: #fff;
            transition: border-color 0.2s ease;
        }
        .input-group input:focus {
            outline: none;
            border-color: #111;
        }

        /* 체크박스 및 약관 동의 */
        .options-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: #666;
            margin-bottom: 25px;
        }
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }
        .find-link:hover {
            text-decoration: underline;
            color: #111;
        }

        /* 이용약관 텍스트 박스 */
        .policy-text {
            font-size: 11px;
            color: #888;
            line-height: 1.5;
            margin-bottom: 20px;
            padding: 10px;
            background: #f9f9f9;
            border: 1px solid #eee;
        }

        /* 버튼 스타일 */
        .btn-submit {
            width: 100%;
            padding: 14px;
            background-color: #111;
            color: #fff;
            border: none;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 1px;
            cursor: pointer;
            transition: background-color 0.2s ease;
            margin-bottom: 20px;
        }
        .btn-submit:hover {
            background-color: #333;
        }

        /* 하단 전환 유도 박스 */
        .switch-box {
            border-top: 1px solid #eee;
            padding-top: 20px;
            text-align: center;
            font-size: 12px;
            color: #666;
        }
        .btn-switch {
            background: none;
            border: none;
            margin-top: 8px;
            font-size: 12px;
            font-weight: 500;
            text-decoration: underline;
            color: #111;
            cursor: pointer;
        }

        /* 반응형 디바이스 대응 */
        @media (max-width: 600px) {
            .nav-menu { display: none; } 
            .account-container {
                padding: 30px 20px;
                border: none;
                background: transparent;
            }
            .account-wrapper {
                background-color: #fff;
                align-items: flex-start;
                padding-top: 20px;
            }
        }
    </style>
</head>
<body>

    <!-- 1. 상단 헤더 및 내비게이션 -->
    <header>
        <div class="header-top">
            <!-- [수정] MENEMO 텍스트를 고정 높이 45px를 가진 이미지 로고 구조로 변경 -->
            <div class="logo">
                <a href="index.html">
                    <img src="logo/logo_B.png" alt="MNEMO" class="logo-img">
                </a>
            </div>
            <div class="search-container">
                <input type="text" placeholder="검색">
            </div>
            <div class="header-util">
                <a href="login.html" onclick="showBox('login')">로그인 / 회원 가입</a>
                <a href="cart.html">장바구니 (0)</a>
            </div>
        </div>
        <nav class="nav-bar">
            <ul class="nav-menu">
                <li><a href="index.html">홈</a></li>
                <li><a href="sell_main.html">상품</a></li>
                <li><a href="menemo.html">므네모 소개</a></li>
                <li><a href="custom_who.html">나만의 향수 만들기</a></li>
            </ul>
        </nav>
    </header>

    <!-- 2. 계정 처리 메인 섹션 -->
    <div class="account-wrapper">
        <main class="account-container">
            
            <!-- [FORM 1] 로그인 박스 -->
            <div id="login-box" class="account-box active">
                <h2 class="account-title">Login</h2>
                <form action="#" method="POST">
                    <div class="input-group">
                        <label for="login-email">이메일 주소</label>
                        <input type="email" id="login-email" name="email" required autocomplete="email">
                    </div>
                    <div class="input-group">
                        <label for="login-password">비밀번호</label>
                        <input type="password" id="login-password" name="password" required autocomplete="current-password">
                    </div>
                    <div class="options-bar">
                        <label class="checkbox-label">
                            <input type="checkbox" name="remember"> 이메일 저장
                        </label>
                        <a href="#" class="find-link">비밀번호 찾기</a>
                    </div>
                    <button type="submit" class="btn-submit">로그인</button>
                </form>
                <div class="switch-box">
                    <p>아직 므네모의 회원이 아니신가요?</p>
                    <button type="button" class="btn-switch" onclick="showBox('register')">회원가입하기</button>
                </div>
            </div>

            <!-- [FORM 2] 회원가입 박스 (기본 숨김) -->
            <div id="register-box" class="account-box">
                <h2 class="account-title">Create Account</h2>
                <form action="#" method="POST">
                    <div class="input-group">
                        <label for="reg-name">이름</label>
                        <input type="text" id="reg-name" name="name" required>
                    </div>
                    <div class="input-group">
                        <label for="reg-email">이메일 주소</label>
                        <input type="email" id="reg-email" name="email" required autocomplete="username">
                    </div>
                    <div class="input-group">
                        <label for="reg-password">비밀번호 (8자 이상, 문자/숫자 포함)</label>
                        <input type="password" id="reg-password" name="password" minlength="8" required autocomplete="new-password">
                    </div>
                    <div class="policy-text">
                        가입 시 므네모(MENEMO)의 개인정보처리방침 및 서비스 이용약관에 동의하게 되며, 브랜드의 기억 컬렉션 소식을 전하는 웰컴 메일링에 수신 동의됩니다.
                    </div>
                    <button type="submit" class="btn-submit">계정 만들기</button>
                </form>
                <div class="switch-box">
                    <p>이미 므네모의 계정이 있으신가요?</p>
                    <button type="button" class="btn-switch" onclick="showBox('login')">로그인 화면으로 돌아가기</button>
                </div>
            </div>

        </main>
    </div>

    <!-- 3. 화면 유기적 전환을 위한 스크립트 -->
    <script>
        function showBox(type) {
            // 모든 폼 상자 닫기
            document.getElementById('login-box').classList.remove('active');
            document.getElementById('register-box').classList.remove('active');
            
            // 원하는 폼 상자만 활성화
            if(type === 'login') {
                document.getElementById('login-box').classList.add('active');
            } else if(type === 'register') {
                document.getElementById('register-box').classList.add('active');
            }
        }
    </script>
</body>
</html>
